label:
  comment: Optional label for the masonry layout to help identify it in the editor.
  type: text
columns:
  comment: The number of columns in the masonry layout.
  type: select
  options:
    values:
      - id: 2
        name: 2 Columns
      - id: 3
        name: 3 Columns
      - id: 4
        name: 4 Columns
items:
  label: Masonry Items
  comment: Array of masonry items with varying heights that flow into columns.
  type: array
  options:
    structures: _structures.masonryItems
gap:
  comment: The gap between masonry items.
  type: select
  options:
    values:
      - id: xs
        name: Extra Small
      - id: sm
        name: Small
      - id: md
        name: Medium
      - id: lg
        name: Large
      - id: xl
        name: Extra Large
      - id: 2xl
        name: 2xl
      - id: 3xl
        name: 3xl
